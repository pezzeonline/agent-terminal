# PR CI, gated behind manual approval.
#
# One-time setup (otherwise the `approve` gate is a no-op):
#   Repo Settings → Environments → New environment → name `ci-approval`
#   → enable "Required reviewers" → add yourself → save.

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Integration branches that stack PRs:
    # - main: production target.
    # - feat/desktop-sidecar-substrate: epic branch for the mobile-companion
    #   server stack. Sub-step PRs target this branch and only land in main
    #   once the whole stack is ready.
    branches:
      - main
      - feat/desktop-sidecar-substrate
    paths-ignore:
      - 'companion/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  approve:
    name: Wait for manual approval
    runs-on: ubuntu-latest
    environment: ci-approval
    timeout-minutes: 60
    steps:
      - name: Approved
        run: echo "CI approved by ${{ github.actor }}"

  # `if: ${{ !cancelled() }}` on every check below is deliberate: one CI run
  # surfaces every failure in the diff (lint + typecheck + tests, both langs),
  # so the next push can fix all of them at once instead of one-per-cycle.
  js-checks:
    name: JS / TypeScript
    needs: approve
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Biome
        if: ${{ !cancelled() }}
        run: bunx biome check
      - name: tsc --noEmit
        if: ${{ !cancelled() }}
        run: bunx tsc --noEmit
      - name: bun test
        if: ${{ !cancelled() }}
        # Scoped to src/ because bare `bun test` recurses cwd and would
        # discover src-tauri/sidecar/test/*.test.ts. Those tests import
        # @xterm/headless from src-tauri/sidecar/node_modules/, which is
        # installed by the dedicated step below. Root deps and sidecar
        # deps live in separate trees on purpose. Matches the local
        # `bun run test` script.
        run: bun test src/

      # Sidecar substrate has its own dep tree (src-tauri/sidecar/node_modules)
      # because @xterm/headless and addon-serialize are server-side only and
      # have no business in the Tauri frontend bundle. Install + test as a
      # separate step so a failure here is attributed correctly in CI.
      - name: Install sidecar deps
        if: ${{ !cancelled() }}
        working-directory: src-tauri/sidecar
        run: bun install --frozen-lockfile
      - name: Sidecar bun test
        if: ${{ !cancelled() }}
        working-directory: src-tauri/sidecar
        run: bun test

      # Wire-protocol drift check: the committed
      # companion/src/modules/wss/protocol.gen.ts must be byte-identical to
      # what `cargo xtask regen-protocol` produces from the current
      # src-tauri/src/protocol.rs. If a contributor edits protocol.rs
      # without regenerating, CI fails here with a clear "run
      # `cargo xtask regen-protocol`" message instead of a confusing
      # tsc-side type error later.
      #
      # Lives in js-checks (not rust-checks) because the codegen path
      # needs BOTH cargo AND bun (for biome format on the output). This
      # job already has both.
      - name: Rust toolchain (for xtask)
        if: ${{ !cancelled() }}
        uses: dtolnay/rust-toolchain@stable
      - name: Cache typeshare-cli install
        if: ${{ !cancelled() }}
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/typeshare
          key: typeshare-cli-1.13.4-${{ runner.os }}
      - name: Install typeshare-cli
        if: ${{ !cancelled() }}
        run: |
          if ! command -v typeshare >/dev/null 2>&1; then
            cargo install typeshare-cli --version 1.13.4 --locked
          fi
      # xtask shells out to `bunx @biomejs/biome format --write ...` from
      # cwd=`companion/`. Without companion's own node_modules present,
      # bunx walks up to the root's node_modules and picks up whatever
      # biome version lives there — currently 2.4.15, which does not
      # recognise companion/biome.json's 2.5.x-shape `preset` rules key
      # and refuses to load the config. Installing companion's deps here
      # gives bunx the right biome (2.5.1) via companion/node_modules.
      - name: Install companion deps (for bunx biome inside xtask)
        if: ${{ !cancelled() }}
        working-directory: companion
        run: bun install --frozen-lockfile
      - name: Regenerate protocol bindings
        if: ${{ !cancelled() }}
        run: cargo xtask regen-protocol
      - name: Verify no drift
        if: ${{ !cancelled() }}
        # `git diff --quiet` is equivalent to `--exit-status` in intent
        # (exit 0 = no diff, exit 1 = diff present) and more portable
        # across `git` builds — a previous CI run rejected the longer
        # spelling with `error: invalid option`, which we could not
        # reproduce elsewhere.
        run: |
          if ! git diff --quiet companion/src/modules/wss/protocol.gen.ts; then
            echo "::error::companion/src/modules/wss/protocol.gen.ts is out of sync with src-tauri/src/protocol.rs."
            echo "::error::Run 'cargo xtask regen-protocol' locally and commit the result."
            echo "::group::Actual drift (from committed to CI-regenerated)"
            git --no-pager diff companion/src/modules/wss/protocol.gen.ts
            echo "::endgroup::"
            exit 1
          fi

  # Single job, not split per check: cargo's incremental build cache is shared
  # across check / clippy / test, so splitting would recompile Tauri/Wry deps
  # from scratch in each parallel job.
  rust-checks:
    name: Rust / Tauri
    needs: approve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: '1'
    steps:
      - uses: actions/checkout@v4

      # tauri-runtime-wry's build script links against WebKitGTK during
      # dependency compilation — required even for `cargo check`, not just
      # build. Apt list mirrors Tauri 2's prerequisites doc.
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo check
        if: ${{ !cancelled() }}
        working-directory: src-tauri
        run: cargo check --all-targets
      - name: cargo clippy
        if: ${{ !cancelled() }}
        working-directory: src-tauri
        run: cargo clippy --all-targets
      - name: cargo test --lib
        if: ${{ !cancelled() }}
        working-directory: src-tauri
        run: cargo test --lib

      # hook_integration tests share filesystem state and a fixed HTTP port,
      # so they must run serially. Mirrors the project's `bun run test` script.
      - name: cargo test --test hook_integration
        if: ${{ !cancelled() }}
        working-directory: src-tauri
        run: cargo test --test hook_integration -- --test-threads=1
